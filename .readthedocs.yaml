version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - pip install uv
    install:
      - uv pip install --system mkdocs-material 'mkdocstrings[python]' mkdocs-include-markdown-plugin

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true
